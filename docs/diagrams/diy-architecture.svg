<svg viewBox="0 0 860 580" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">

  <defs>
    <marker id="b1" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#475569"/>
    </marker>
    <marker id="b2" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#FF6600"/>
    </marker>
    <marker id="b3" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#336791"/>
    </marker>
    <marker id="b4" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#DC2626"/>
    </marker>
    <filter id="sh" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000012"/>
    </filter>
  </defs>

  <!-- Canvas -->
  <rect width="860" height="580" fill="#F8FAFC"/>

  <!-- ─── Header ─────────────────────────────────────────────────────────── -->
  <rect width="860" height="64" fill="#1E293B"/>
  <!-- Warning/complexity indicator -->
  <rect x="20" y="14" width="36" height="36" rx="8" fill="#DC2626"/>
  <text x="38" y="37" text-anchor="middle" font-size="20" fill="white">⚠</text>
  <text x="67" y="27" font-size="17" font-weight="700" fill="#F1F5F9" letter-spacing="-0.3">DIY — build all of this to match Temporal's guarantees</text>
  <text x="67" y="48" font-size="12" fill="#64748B">4 processes · 6 PostgreSQL tables · 1 RabbitMQ queue · 5 failure modes to handle per task</text>

  <!-- ─── API SERVER ─────────────────────────────────────────────────────── -->
  <rect x="280" y="80" width="300" height="56" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#sh)"/>
  <!-- Node.js hexagon badge -->
  <polygon points="299,89 311,82 323,89 323,103 311,110 299,103" fill="#539E43"/>
  <text x="311" y="100" text-anchor="middle" font-size="9" font-weight="700" fill="white">JS</text>
  <text x="340" y="98" font-size="11" font-weight="700" fill="#1E293B">API Server  :3001</text>
  <text x="340" y="114" font-size="9.5" fill="#64748B">POST /workflows/subscription → start</text>

  <!-- API → PostgreSQL arrow -->
  <path d="M280,108 L220,108 L220,172" stroke="#336791" stroke-width="1.5" fill="none" marker-end="url(#b3)"/>
  <!-- API → RabbitMQ arrow -->
  <path d="M580,108 L640,108 L640,172" stroke="#FF6600" stroke-width="1.5" fill="none" marker-end="url(#b2)"/>

  <!-- Labels on arrows -->
  <text x="240" y="102" font-size="8.5" fill="#336791" font-weight="500">INSERT state</text>
  <text x="588" y="102" font-size="8.5" fill="#FF6600" font-weight="500">PUBLISH task</text>

  <!-- ─── POSTGRESQL panel ───────────────────────────────────────────────── -->
  <rect x="20" y="172" width="240" height="388" rx="10" fill="#FFFFFF" stroke="#336791" stroke-width="2" filter="url(#sh)"/>

  <!-- PostgreSQL header -->
  <rect x="20" y="172" width="240" height="40" rx="10" fill="#336791"/>
  <rect x="20" y="196" width="240" height="16" fill="#336791"/>
  <!-- Elephant icon (simplified) -->
  <ellipse cx="42"  cy="192" rx="9"   ry="8.5" fill="white"/>
  <ellipse cx="42"  cy="184" rx="6.5" ry="5.5" fill="white"/>
  <path d="M34,198 Q31,206 35,203" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="35"  cy="185" rx="3.5" ry="5.5" fill="white" transform="rotate(-15,35,185)"/>
  <text x="62" y="196" font-size="13" font-weight="700" fill="white">PostgreSQL</text>

  <!-- Six tables -->
  <!-- subscription_workflows -->
  <rect x="30" y="224" width="220" height="46" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
  <rect x="30" y="224" width="8"   height="46" rx="4" fill="#3B82F6"/>
  <text x="46" y="239" font-size="10.5" font-weight="700" fill="#1D4ED8">subscription_workflows</text>
  <text x="46" y="254" font-size="9"   fill="#3B82F6">state · trial_end_at · metadata</text>
  <text x="46" y="265" font-size="8.5" fill="#93C5FD" font-style="italic">the state machine — source of truth</text>

  <!-- workflow_events -->
  <rect x="30" y="276" width="220" height="42" rx="6" fill="#F5F3FF" stroke="#8B5CF6" stroke-width="1"/>
  <rect x="30" y="276" width="8"   height="42" rx="4" fill="#8B5CF6"/>
  <text x="46" y="291" font-size="10.5" font-weight="700" fill="#6D28D9">workflow_events</text>
  <text x="46" y="306" font-size="9"   fill="#7C3AED">append-only audit log of every transition</text>
  <text x="46" y="315" font-size="8.5" fill="#C4B5FD" font-style="italic">the poor man's workflow history</text>

  <!-- activity_attempts -->
  <rect x="30" y="324" width="220" height="42" rx="6" fill="#FFF7ED" stroke="#F97316" stroke-width="1"/>
  <rect x="30" y="324" width="8"   height="42" rx="4" fill="#F97316"/>
  <text x="46" y="339" font-size="10.5" font-weight="700" fill="#C2410C">activity_attempts</text>
  <text x="46" y="354" font-size="9"   fill="#EA580C">attempt # · status · error_message</text>
  <text x="46" y="363" font-size="8.5" fill="#FDBA74" font-style="italic">retry history per activity</text>

  <!-- idempotency_keys -->
  <rect x="30" y="372" width="220" height="42" rx="6" fill="#ECFDF5" stroke="#22C55E" stroke-width="1"/>
  <rect x="30" y="372" width="8"   height="42" rx="4" fill="#22C55E"/>
  <text x="46" y="387" font-size="10.5" font-weight="700" fill="#15803D">idempotency_keys</text>
  <text x="46" y="402" font-size="9"   fill="#16A34A">key = workflowId:activityType</text>
  <text x="46" y="411" font-size="8.5" fill="#86EFAC" font-style="italic">checked before every execution</text>

  <!-- workflow_locks -->
  <rect x="30" y="420" width="220" height="42" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1"/>
  <rect x="30" y="420" width="8"   height="42" rx="4" fill="#EF4444"/>
  <text x="46" y="435" font-size="10.5" font-weight="700" fill="#991B1B">workflow_locks</text>
  <text x="46" y="450" font-size="9"   fill="#DC2626">locked_by · expires_at (TTL 30s)</text>
  <text x="46" y="459" font-size="8.5" fill="#FCA5A5" font-style="italic">distributed mutex — one worker at a time</text>

  <!-- scheduled_tasks -->
  <rect x="30" y="468" width="220" height="42" rx="6" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1"/>
  <rect x="30" y="468" width="8"   height="42" rx="4" fill="#F59E0B"/>
  <text x="46" y="483" font-size="10.5" font-weight="700" fill="#92400E">scheduled_tasks</text>
  <text x="46" y="498" font-size="9"   fill="#D97706">execute_after · published_at</text>
  <text x="46" y="507" font-size="8.5" fill="#FCD34D" font-style="italic">delayed retries (replaces Redis ZSET)</text>

  <!-- dead_letter_tasks footnote -->
  <text x="30" y="530" font-size="9" fill="#94A3B8" font-style="italic">+ dead_letter_tasks (exhausted retries)</text>
  <text x="30" y="548" font-size="9" fill="#94A3B8" font-style="italic">+ 6 indexes for performance</text>

  <!-- ─── RABBITMQ panel ─────────────────────────────────────────────────── -->
  <rect x="600" y="172" width="240" height="152" rx="10" fill="#FFFFFF" stroke="#FF6600" stroke-width="2" filter="url(#sh)"/>

  <!-- RabbitMQ header -->
  <rect x="600" y="172" width="240" height="40" rx="10" fill="#FF6600"/>
  <rect x="600" y="196" width="240" height="16" fill="#FF6600"/>
  <!-- Rabbit ears (simplified) -->
  <rect x="618" y="176" width="7"  height="15" rx="3.5" fill="white"/>
  <rect x="628" y="176" width="7"  height="15" rx="3.5" fill="white"/>
  <ellipse cx="627" cy="196" rx="9" ry="7" fill="white"/>
  <text x="648" y="196" font-size="13" font-weight="700" fill="white">RabbitMQ</text>

  <!-- Queue display -->
  <rect x="612" y="224" width="216" height="86" rx="6" fill="#FFF7F0" stroke="#FF6600" stroke-width="1"/>
  <text x="720" y="243" text-anchor="middle" font-size="10.5" font-weight="700" fill="#C2410C">diy.tasks</text>
  <text x="720" y="258" text-anchor="middle" font-size="9" fill="#9A3412">AMQP · durable · manual ack</text>
  <line x1="620" y1="264" x2="820" y2="264" stroke="#FDBA74" stroke-width="1"/>

  <!-- Message pills -->
  <rect x="620" y="270" width="82" height="16" rx="8" fill="#FF6600" opacity="0.9"/>
  <text x="661" y="282" text-anchor="middle" font-size="8" fill="white" font-weight="600">SEND_WELCOME</text>
  <rect x="706" y="270" width="60" height="16" rx="8" fill="#FF6600" opacity="0.6"/>
  <text x="736" y="282" text-anchor="middle" font-size="8" fill="white">CHARGE</text>
  <rect x="770" y="270" width="58" height="16" rx="8" fill="#FF6600" opacity="0.3"/>
  <text x="799" y="282" text-anchor="middle" font-size="8" fill="#9A3412">EMAILS</text>

  <!-- RabbitMQ ACK note -->
  <rect x="612" y="316" width="216" height="20" rx="4" fill="#FFF7F0"/>
  <text x="720" y="329" text-anchor="middle" font-size="8.5" fill="#C2410C">crash before ack → broker redelivers</text>

  <!-- ─── WORKER panel ────────────────────────────────────────────────────── -->
  <rect x="276" y="156" width="308" height="384" rx="10" fill="#FFFFFF" stroke="#334155" stroke-width="1.5" filter="url(#sh)"/>

  <!-- Worker header -->
  <rect x="276" y="156" width="308" height="38" rx="10" fill="#1E293B"/>
  <rect x="276" y="178" width="308" height="16" fill="#1E293B"/>
  <!-- Node.js hex -->
  <polygon points="291,162 303,155 315,162 315,176 303,183 291,176" fill="#539E43"/>
  <text x="303" y="173" text-anchor="middle" font-size="9.5" font-weight="700" fill="white">JS</text>
  <text x="326" y="171" font-size="12" font-weight="600" fill="#F1F5F9">Worker Process</text>
  <text x="438" y="168" font-size="9" fill="#64748B" font-style="italic">one at a time (prefetch=1)</text>

  <!-- Worker steps (numbered flow) -->
  <!-- Step 1 -->
  <rect x="286" y="206" width="288" height="30" rx="6" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <circle cx="304" cy="221" r="9" fill="#475569"/>
  <text x="304" y="225" text-anchor="middle" font-size="10" font-weight="700" fill="white">1</text>
  <text x="320" y="219" font-size="10" font-weight="600" fill="#1E293B">consume task from RabbitMQ</text>
  <text x="320" y="230" font-size="8.5" fill="#64748B">message stays unacked until step 7</text>

  <!-- connector line -->
  <line x1="430" y1="236" x2="430" y2="244" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- Step 2 -->
  <rect x="286" y="244" width="288" height="30" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1"/>
  <circle cx="304" cy="259" r="9" fill="#DC2626"/>
  <text x="304" y="263" text-anchor="middle" font-size="10" font-weight="700" fill="white">2</text>
  <text x="320" y="257" font-size="10" font-weight="600" fill="#991B1B">acquire workflow_lock</text>
  <text x="320" y="268" font-size="8.5" fill="#DC2626">another worker holds it → republish, skip</text>

  <line x1="430" y1="274" x2="430" y2="282" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- Step 3 -->
  <rect x="286" y="282" width="288" height="30" rx="6" fill="#ECFDF5" stroke="#22C55E" stroke-width="1"/>
  <circle cx="304" cy="297" r="9" fill="#16A34A"/>
  <text x="304" y="301" text-anchor="middle" font-size="10" font-weight="700" fill="white">3</text>
  <text x="320" y="295" font-size="10" font-weight="600" fill="#15803D">check idempotency_keys</text>
  <text x="320" y="306" font-size="8.5" fill="#16A34A">already done → skip, advance state</text>

  <line x1="430" y1="312" x2="430" y2="320" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- Step 4 -->
  <rect x="286" y="320" width="288" height="30" rx="6" fill="#FFF7ED" stroke="#F97316" stroke-width="1"/>
  <circle cx="304" cy="335" r="9" fill="#EA580C"/>
  <text x="304" y="339" text-anchor="middle" font-size="10" font-weight="700" fill="white">4</text>
  <text x="320" y="333" font-size="10" font-weight="600" fill="#C2410C">execute activity (the side effect)</text>
  <text x="320" y="344" font-size="8.5" fill="#EA580C">throws → INSERT scheduled_tasks (backoff)</text>

  <line x1="430" y1="350" x2="430" y2="358" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- Step 5 -->
  <rect x="286" y="358" width="288" height="40" rx="6" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1"/>
  <circle cx="304" cy="378" r="9" fill="#2563EB"/>
  <text x="304" y="382" text-anchor="middle" font-size="10" font-weight="700" fill="white">5</text>
  <text x="320" y="372" font-size="10" font-weight="600" fill="#1D4ED8">ATOMIC transaction</text>
  <text x="320" y="384" font-size="8.5" fill="#2563EB">INSERT idempotency_keys</text>
  <text x="320" y="395" font-size="8.5" fill="#2563EB">UPDATE state · INSERT workflow_events</text>

  <line x1="430" y1="398" x2="430" y2="406" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- Step 6 -->
  <rect x="286" y="406" width="288" height="30" rx="6" fill="#FFF7F0" stroke="#FF6600" stroke-width="1"/>
  <circle cx="304" cy="421" r="9" fill="#FF6600"/>
  <text x="304" y="425" text-anchor="middle" font-size="10" font-weight="700" fill="white">6</text>
  <text x="320" y="419" font-size="10" font-weight="600" fill="#C2410C">PUBLISH next task to RabbitMQ</text>
  <text x="320" y="430" font-size="8.5" fill="#EA580C">fails → workflow stuck, reconciler repairs</text>

  <line x1="430" y1="436" x2="430" y2="444" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- Step 7 -->
  <rect x="286" y="444" width="288" height="30" rx="6" fill="#F0FDF4" stroke="#22C55E" stroke-width="1"/>
  <circle cx="304" cy="459" r="9" fill="#22C55E"/>
  <text x="304" y="463" text-anchor="middle" font-size="10" font-weight="700" fill="white">7</text>
  <text x="320" y="457" font-size="10" font-weight="600" fill="#15803D">channel.ack(msg)</text>
  <text x="320" y="468" font-size="8.5" fill="#16A34A">RabbitMQ removes message from queue</text>

  <!-- Worker arrows to PostgreSQL -->
  <path d="M276,297 L260,297" stroke="#336791" stroke-width="1.5" stroke-dasharray="4,2" fill="none" marker-end="url(#b3)"/>
  <path d="M276,378 L260,378" stroke="#336791" stroke-width="1.5" stroke-dasharray="4,2" fill="none" marker-end="url(#b3)"/>

  <!-- Worker arrows to RabbitMQ -->
  <path d="M584,221 L600,221" stroke="#FF6600" stroke-width="1.5" stroke-dasharray="4,2" fill="none" marker-end="url(#b2)"/>
  <path d="M584,421 L600,421" stroke="#FF6600" stroke-width="1.5" stroke-dasharray="4,2" fill="none" marker-end="url(#b2)"/>

  <!-- ─── SCHEDULER panel ────────────────────────────────────────────────── -->
  <rect x="600" y="340" width="240" height="100" rx="10" fill="#FFFFFF" stroke="#D97706" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="600" y="340" width="240" height="34" rx="10" fill="#D97706"/>
  <rect x="600" y="358" width="240" height="16" fill="#D97706"/>
  <text x="612" y="363" font-size="12" font-weight="600" fill="white">⏰  Scheduler</text>
  <text x="612" y="378" font-size="9" fill="#FEF3C7">Polls PostgreSQL every 2s</text>
  <line x1="608" y1="383" x2="832" y2="383" stroke="#FCD34D" stroke-width="1"/>
  <text x="608" y="396" font-size="8.5" fill="#92400E">trial_end_at ≤ NOW() → PUBLISH charge task</text>
  <text x="608" y="408" font-size="8.5" fill="#92400E">scheduled_tasks.execute_after ≤ NOW() →</text>
  <text x="608" y="419" font-size="8.5" fill="#92400E">PUBLISH retry task, mark published_at</text>
  <text x="608" y="432" font-size="8.5" fill="#B45309" font-style="italic">Temporal equivalent: workflow.sleep()</text>

  <!-- Scheduler arrows -->
  <path d="M600,390 L276,390" stroke="#D97706" stroke-width="1" stroke-dasharray="5,3" fill="none"/>
  <path d="M600,410 L276,490" stroke="#D97706" stroke-width="1" stroke-dasharray="5,3" fill="none"/>
  <path d="M720,340 L720,324" stroke="#FF6600" stroke-width="1.5" fill="none" marker-end="url(#b2)"/>

  <!-- ─── RECONCILER panel ────────────────────────────────────────────────── -->
  <rect x="600" y="454" width="240" height="106" rx="10" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="600" y="454" width="240" height="34" rx="10" fill="#DC2626"/>
  <rect x="600" y="472" width="240" height="16" fill="#DC2626"/>
  <text x="612" y="477" font-size="12" font-weight="600" fill="white">🔧  Reconciler</text>
  <text x="612" y="492" font-size="9" fill="#FEE2E2">Polls PostgreSQL every 10s</text>
  <line x1="608" y1="497" x2="832" y2="497" stroke="#FCA5A5" stroke-width="1"/>
  <text x="608" y="510" font-size="8.5" fill="#991B1B">DELETE workflow_locks WHERE expires_at &lt; NOW</text>
  <text x="608" y="522" font-size="8.5" fill="#991B1B">SELECT stuck workflows → INSERT scheduled_tasks</text>
  <text x="608" y="534" font-size="8.5" fill="#991B1B">reset timed-out activity_attempts</text>
  <text x="608" y="549" font-size="8.5" fill="#B91C1C" font-style="italic">Temporal equivalent: server heartbeat detection</text>

  <!-- Reconciler arrows -->
  <path d="M600,508 L276,440" stroke="#DC2626" stroke-width="1" stroke-dasharray="5,3" fill="none"/>
  <path d="M600,522 L276,468" stroke="#DC2626" stroke-width="1" stroke-dasharray="5,3" fill="none"/>

  <!-- ─── Side labels ─────────────────────────────────────────────────────── -->
  <text x="260" y="333" font-size="8.5" fill="#336791" font-weight="600" transform="rotate(-90,260,333)" text-anchor="middle">READ / WRITE</text>
  <text x="586" y="333" font-size="8.5" fill="#FF6600" font-weight="600" transform="rotate(90,586,333)"  text-anchor="middle">PUBLISH / ACK</text>

  <!-- ─── Bottom note ──────────────────────────────────────────────────────── -->
  <rect x="20" y="564" width="820" height="12" fill="#F1F5F9"/>
  <text x="430" y="573" text-anchor="middle" font-size="9" fill="#94A3B8">
    This is the dual-write problem: you cannot atomically update PostgreSQL AND publish to RabbitMQ in one transaction. Temporal eliminates it — they are the same system.
  </text>

</svg>
