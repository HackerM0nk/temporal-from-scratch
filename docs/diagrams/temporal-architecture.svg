<svg viewBox="0 0 860 500" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">

  <defs>
    <!-- Arrow markers -->
    <marker id="a1" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#475569"/>
    </marker>
    <marker id="a2" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#7C3AED"/>
    </marker>
    <marker id="a3" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3B82F6"/>
    </marker>
    <marker id="a4" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#16A34A"/>
    </marker>
    <!-- Subtle drop shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000014"/>
    </filter>
  </defs>

  <!-- Canvas -->
  <rect width="860" height="500" fill="#F8FAFC" rx="0"/>

  <!-- ─── Header ─────────────────────────────────────────────────────────── -->
  <rect width="860" height="64" fill="#0F172A"/>
  <!-- Temporal logo mark (two concentric circles) -->
  <circle cx="36" cy="32" r="16" fill="none" stroke="#7C3AED" stroke-width="2.5"/>
  <circle cx="36" cy="32" r="8"  fill="none" stroke="#7C3AED" stroke-width="2.5"/>
  <circle cx="36" cy="32" r="2"  fill="#7C3AED"/>
  <text x="62" y="27" font-size="17" font-weight="700" fill="#F1F5F9" letter-spacing="-0.3">Temporal — durable execution engine</text>
  <text x="62" y="48" font-size="12" fill="#64748B">Your workflow code is ordinary async TypeScript. Temporal handles crash recovery, timers, and retries underneath.</text>

  <!-- ─── YOUR CODE panel ────────────────────────────────────────────────── -->
  <rect x="20" y="84" width="210" height="400" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- macOS window bar -->
  <rect x="20" y="84" width="210" height="36" rx="10" fill="#1E293B"/>
  <rect x="20" y="104" width="210" height="16" fill="#1E293B"/>
  <circle cx="42"  cy="102" r="5" fill="#EF4444"/>
  <circle cx="59"  cy="102" r="5" fill="#F59E0B"/>
  <circle cx="76"  cy="102" r="5" fill="#22C55E"/>
  <text x="115" y="106" text-anchor="middle" font-size="10" fill="#64748B">subscriptionWorkflow.ts</text>

  <!-- Code body -->
  <text x="32" y="135" font-size="9.5" font-family="'SF Mono',Menlo,Consolas,monospace" fill="#94A3B8">// 100 lines total</text>

  <text x="32" y="155" font-size="9.5" font-family="'SF Mono',Menlo,Consolas,monospace" fill="#C084FC">async function</text>
  <text x="32" y="169" font-size="9.5" font-family="'SF Mono',Menlo,Consolas,monospace" fill="#C084FC">  subscriptionWorkflow</text>
  <text x="32" y="183" font-size="9.5" font-family="'SF Mono',Menlo,Consolas,monospace" fill="#CBD5E1">  (customerId) {</text>

  <text x="32" y="203" font-size="9.5" font-family="'SF Mono',Menlo,Consolas,monospace" fill="#94A3B8">  await </text>
  <text x="68" y="203" font-size="9.5" font-family="'SF Mono',Menlo,Consolas,monospace" fill="#67E8F9">sendWelcomeEmail</text>
  <text x="32" y="216" font-size="9.5" font-family="'SF Mono',Menlo,Consolas,monospace" fill="#CBD5E1">    (customerId);</text>

  <!-- Highlighted sleep line -->
  <rect x="26" y="222" width="197" height="38" rx="5" fill="#3B0764" opacity="0.7"/>
  <rect x="26" y="222" width="4"   height="38" rx="2" fill="#7C3AED"/>
  <text x="38" y="237" font-size="9.5" font-family="'SF Mono',Menlo,Consolas,monospace" fill="#94A3B8">  await </text>
  <text x="74" y="237" font-size="9.5" font-family="'SF Mono',Menlo,Consolas,monospace" fill="#C084FC">condition</text>
  <text x="38" y="252" font-size="9.5" font-family="'SF Mono',Menlo,Consolas,monospace" fill="#CBD5E1">    (cancelled, 30d);</text>

  <text x="32" y="276" font-size="9.5" font-family="'SF Mono',Menlo,Consolas,monospace" fill="#94A3B8">  await </text>
  <text x="68" y="276" font-size="9.5" font-family="'SF Mono',Menlo,Consolas,monospace" fill="#67E8F9">chargeMonthlyFee</text>
  <text x="32" y="290" font-size="9.5" font-family="'SF Mono',Menlo,Consolas,monospace" fill="#CBD5E1">    (customerId);</text>

  <text x="32" y="309" font-size="9.5" font-family="'SF Mono',Menlo,Consolas,monospace" fill="#94A3B8">  await </text>
  <text x="68" y="309" font-size="9.5" font-family="'SF Mono',Menlo,Consolas,monospace" fill="#67E8F9">sendEndOfTrialEmail</text>
  <text x="32" y="323" font-size="9.5" font-family="'SF Mono',Menlo,Consolas,monospace" fill="#CBD5E1">    (customerId);</text>

  <text x="32" y="343" font-size="9.5" font-family="'SF Mono',Menlo,Consolas,monospace" fill="#CBD5E1">}</text>

  <!-- Badges -->
  <rect x="30" y="363" width="190" height="22" rx="11" fill="#DCFCE7" stroke="#16A34A" stroke-width="1"/>
  <text x="125" y="378" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">✓  100 lines total</text>

  <rect x="30" y="392" width="190" height="22" rx="11" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1"/>
  <text x="125" y="407" text-anchor="middle" font-size="10" font-weight="600" fill="#6D28D9">✓  crash-proof by default</text>

  <rect x="30" y="421" width="190" height="22" rx="11" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="125" y="436" text-anchor="middle" font-size="10" font-weight="600" fill="#92400E">✓  retries automatic</text>

  <rect x="30" y="450" width="190" height="22" rx="11" fill="#FEE2E2" stroke="#DC2626" stroke-width="1"/>
  <text x="125" y="465" text-anchor="middle" font-size="10" font-weight="600" fill="#991B1B">✓  signals durable</text>

  <!-- Arrow from code → temporal server -->
  <path d="M231,240 L249,240" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a2)"/>

  <!-- ─── TEMPORAL SERVER panel ──────────────────────────────────────────── -->
  <rect x="250" y="84" width="590" height="220" rx="10" fill="#FFFFFF" stroke="#0F172A" stroke-width="2" filter="url(#shadow)"/>

  <!-- Server header -->
  <rect x="250" y="84"  width="590" height="38" rx="10" fill="#0F172A"/>
  <rect x="250" y="106" width="590" height="16" fill="#0F172A"/>

  <!-- Temporal logo in header -->
  <circle cx="271" cy="103" r="11" fill="none" stroke="#7C3AED" stroke-width="2"/>
  <circle cx="271" cy="103" r="5.5" fill="none" stroke="#7C3AED" stroke-width="2"/>
  <circle cx="271" cy="103" r="1.5" fill="#7C3AED"/>
  <text x="291" y="108" font-size="13" font-weight="700" fill="#F1F5F9" letter-spacing="0.3">Temporal Server</text>
  <text x="620" y="105" font-size="10" fill="#475569" font-style="italic">temporalio/auto-setup</text>

  <!-- ── Workflow History sub-box ── -->
  <rect x="264" y="132" width="178" height="156" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>

  <!-- PostgreSQL logo badge -->
  <rect x="272" y="142" width="110" height="22" rx="11" fill="#336791"/>
  <!-- Elephant silhouette (very simplified) -->
  <ellipse cx="285" cy="153" rx="7"  ry="6.5" fill="white"/>
  <ellipse cx="285" cy="147" rx="5"  ry="4.5" fill="white"/>
  <path d="M280,157 Q277,163 280,161" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <text x="340" y="157" text-anchor="middle" font-size="9.5" font-weight="700" fill="white">PostgreSQL</text>

  <text x="275" y="177" font-size="11" font-weight="700" fill="#1D4ED8">Workflow History</text>
  <line x1="272" y1="182" x2="433" y2="182" stroke="#BFDBFE" stroke-width="1"/>
  <text x="272" y="196" font-size="9" fill="#2563EB">Append-only event log.</text>
  <text x="272" y="209" font-size="9" fill="#2563EB">Each await = one event.</text>
  <text x="272" y="222" font-size="9" fill="#2563EB">Worker crash → replay</text>
  <text x="272" y="235" font-size="9" fill="#2563EB">history, resume in-place.</text>
  <text x="272" y="248" font-size="9" fill="#2563EB">Done activities skipped.</text>
  <text x="272" y="273" font-size="8.5" fill="#93C5FD" font-style="italic">source of truth</text>

  <!-- ── Durable Timers sub-box ── -->
  <rect x="458" y="132" width="172" height="156" rx="8" fill="#FFF7ED" stroke="#F97316" stroke-width="1.5"/>

  <!-- Clock icon (hand-drawn style) -->
  <circle cx="500" cy="154" r="15" fill="#FFEDD5" stroke="#F97316" stroke-width="2"/>
  <line x1="500" y1="143" x2="500" y2="154" stroke="#EA580C" stroke-width="2"  stroke-linecap="round"/>
  <line x1="500" y1="154" x2="508" y2="160" stroke="#EA580C" stroke-width="2"  stroke-linecap="round"/>
  <circle cx="500" cy="154" r="2" fill="#EA580C"/>

  <text x="522" y="149" font-size="10.5" font-weight="700" fill="#9A3412">Durable</text>
  <text x="522" y="163" font-size="10.5" font-weight="700" fill="#9A3412">Timer Store</text>
  <line x1="466" y1="182" x2="622" y2="182" stroke="#FED7AA" stroke-width="1"/>
  <text x="466" y="196" font-size="9" fill="#C2410C">sleep(30 days) lives in</text>
  <text x="466" y="209" font-size="9" fill="#C2410C">the server — not in your</text>
  <text x="466" y="222" font-size="9" fill="#C2410C">worker process memory.</text>
  <text x="466" y="235" font-size="9" fill="#C2410C">Worker crash has zero</text>
  <text x="466" y="248" font-size="9" fill="#C2410C">effect on the timer.</text>
  <text x="466" y="273" font-size="8.5" fill="#FDBA74" font-style="italic">fire-and-forget</text>

  <!-- ── Task Queues sub-box ── -->
  <rect x="646" y="132" width="178" height="156" rx="8" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>

  <!-- Queue stack icon -->
  <rect x="656" y="141" width="42" height="8"  rx="4" fill="#22C55E"/>
  <rect x="656" y="153" width="34" height="8"  rx="4" fill="#86EFAC"/>
  <rect x="656" y="165" width="26" height="8"  rx="4" fill="#BBF7D0"/>

  <text x="706" y="149" font-size="10.5" font-weight="700" fill="#15803D">Task</text>
  <text x="706" y="163" font-size="10.5" font-weight="700" fill="#15803D">Queues</text>
  <line x1="654" y1="182" x2="816" y2="182" stroke="#BBF7D0" stroke-width="1"/>
  <text x="654" y="196" font-size="9" fill="#16A34A">Workflow tasks:</text>
  <text x="654" y="209" font-size="9" fill="#16A34A">advance / replay</text>
  <text x="654" y="222" font-size="9" fill="#16A34A">Activity tasks:</text>
  <text x="654" y="235" font-size="9" fill="#16A34A">execute + retry on</text>
  <text x="654" y="248" font-size="9" fill="#16A34A">configurable backoff.</text>
  <text x="654" y="273" font-size="8.5" fill="#86EFAC" font-style="italic">load-balanced</text>

  <!-- Server → Worker arrow -->
  <line x1="480" y1="305" x2="480" y2="320" stroke="#475569" stroke-width="1.5" marker-end="url(#a1)"/>
  <line x1="700" y1="305" x2="700" y2="320" stroke="#475569" stroke-width="1.5" marker-end="url(#a1)"/>
  <!-- Worker → Server (results) -->
  <path d="M508,305 L508,296" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4,2" fill="none" marker-end="url(#a1)"/>

  <!-- ─── WORKER panel ────────────────────────────────────────────────────── -->
  <rect x="250" y="322" width="590" height="152" rx="10" fill="#FFFFFF" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Worker header -->
  <rect x="250" y="322" width="590" height="34" rx="10" fill="#334155"/>
  <rect x="250" y="342"  width="590" height="14" fill="#334155"/>

  <!-- Gear/cog icon (simplified) -->
  <circle cx="269" cy="339" r="10" fill="#475569"/>
  <circle cx="269" cy="339" r="5.5" fill="#334155"/>
  <rect x="266" y="327" width="6" height="5"  rx="1" fill="#94A3B8" transform="rotate(0,  269,339)"/>
  <rect x="266" y="347" width="6" height="5"  rx="1" fill="#94A3B8" transform="rotate(0,  269,339)"/>
  <rect x="257" y="336" width="5" height="6"  rx="1" fill="#94A3B8" transform="rotate(0,  269,339)"/>
  <rect x="277" y="336" width="5" height="6"  rx="1" fill="#94A3B8" transform="rotate(0,  269,339)"/>

  <text x="288" y="343" font-size="12" font-weight="600" fill="#F1F5F9">Temporal Worker</text>
  <text x="590" y="340" font-size="10" fill="#64748B" font-style="italic">your Node.js process — stateless</text>

  <!-- Workflow Sandbox -->
  <rect x="263" y="366" width="272" height="96" rx="7" fill="#FAF5FF" stroke="#A855F7" stroke-width="1.5"/>
  <rect x="271" y="374" width="165" height="18" rx="9" fill="#7C3AED"/>
  <text x="353" y="387" text-anchor="middle" font-size="9.5" font-weight="700" fill="white">Workflow Sandbox (V8 Isolate)</text>
  <text x="271" y="407" font-size="9" fill="#6B21A8">• Deterministic replay of history</text>
  <text x="271" y="420" font-size="9" fill="#6B21A8">• No I/O — process is forbidden</text>
  <text x="271" y="433" font-size="9" fill="#6B21A8">• Crash = pick up from last event</text>
  <text x="271" y="452" font-size="8.5" fill="#C4B5FD" font-style="italic">crash-resilient by design</text>

  <!-- Activity Executor -->
  <rect x="551" y="366" width="272" height="96" rx="7" fill="#ECFDF5" stroke="#22C55E" stroke-width="1.5"/>
  <rect x="559" y="374" width="170" height="18" rx="9" fill="#16A34A"/>
  <text x="644" y="387" text-anchor="middle" font-size="9.5" font-weight="700" fill="white">Activity Executor (Node.js)</text>
  <text x="559" y="407" font-size="9" fill="#166534">• Real I/O: email, Stripe, DB</text>
  <text x="559" y="420" font-size="9" fill="#166534">• Sends idempotency keys</text>
  <text x="559" y="433" font-size="9" fill="#166534">• Retried automatically by server</text>
  <text x="559" y="452" font-size="8.5" fill="#86EFAC" font-style="italic">your business logic lives here</text>

  <!-- ─── Bottom note ──────────────────────────────────────────────────────── -->
  <rect x="20" y="484" width="820" height="10" fill="#F1F5F9"/>
  <text x="430" y="493" text-anchor="middle" font-size="9" fill="#94A3B8">
    Kill the worker mid-flight. The Temporal server holds all state. Restart — workflow resumes from the exact line it left off.
  </text>

</svg>
